<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | SDcream</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#FDFBF7] text-[#4A3B32] antialiased">
    <!-- Simplified Navigation -->
    <nav class="fixed w-full z-50 transition-all duration-300 bg-[#FDFBF7] shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0 flex items-center mx-auto md:mx-0">
                    <a href="index.html" class="font-serif text-3xl font-bold tracking-widest text-[#D4AF37]">SDcream</a>
                </div>
                <div class="hidden md:flex space-x-10">
                    <a href="index.html" class="nav-link text-[#4A3B32] font-medium transition-colors hover:text-[#D4AF37]">Back to Home</a>
                </div>
                <div class="hidden md:flex items-center space-x-6">
                    <a href="#" class="text-[#4A3B32] hover:text-[#D4AF37] transition-colors"><i class="fa-solid fa-magnifying-glass"></i></a>

                    <a href="checkout.html" class="text-[#4A3B32] hover:text-[#D4AF37] transition-colors relative">
                        <i class="fa-solid fa-bag-shopping"></i>
                        <span class="absolute -top-2 -right-2 bg-[#D4AF37] text-white text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center">2</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Register Form -->
    <section class="min-h-screen flex items-center justify-center pt-24 pb-12 px-4 sm:px-6 lg:px-8 relative">
        <div class="absolute inset-0 z-0">
            <img src="assets/images/product_collection.png" alt="Background" class="w-full h-full object-cover opacity-10">
        </div>
        
        <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl z-10 fade-in">
            <div class="text-center">
                <h2 class="font-serif text-4xl text-[#4A3B32] mb-2">Join the Club</h2>
                <p class="text-sm text-gray-500 font-light">Create a customer account to unlock exclusive perks</p>
            </div>
            <form class="mt-8 space-y-6" onsubmit="event.preventDefault(); window.location.href='login.html';">
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                            <input type="text" required class="appearance-none relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-md focus:outline-none focus:ring-[#D4AF37] focus:border-[#D4AF37] sm:text-sm bg-[#FDFBF7]" placeholder="Jane">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                            <input type="text" required class="appearance-none relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-md focus:outline-none focus:ring-[#D4AF37] focus:border-[#D4AF37] sm:text-sm bg-[#FDFBF7]" placeholder="Doe">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                        <input type="email" required class="appearance-none relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-md focus:outline-none focus:ring-[#D4AF37] focus:border-[#D4AF37] sm:text-sm bg-[#FDFBF7]" placeholder="abc@example.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" required class="appearance-none relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-md focus:outline-none focus:ring-[#D4AF37] focus:border-[#D4AF37] sm:text-sm bg-[#FDFBF7]" placeholder="••••••••">
                    </div>
                </div>

                <div>
                    <button type="submit" class="btn-hover w-full flex justify-center py-4 px-4 border border-transparent text-sm font-medium rounded-sm text-white bg-[#4A3B32] hover:bg-[#322720] shadow-md uppercase tracking-wider">
                        Create Account
                    </button>
                </div>
                
                <div class="mt-4 text-center">
                    <p class="text-sm text-gray-600">
                        Already have an account? 
                        <a href="login.html" class="font-medium text-[#D4AF37] hover:underline">Sign In</a>
                    </p>
                </div>
            </form>
        </div>
    </section>

    <script src="assets/js/main.js"></script>
</body>
</html>
