<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | SDcream</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#FDFBF7] text-[#4A3B32] antialiased">
    <!-- Navigation (Simplified for checkout) -->
    <nav class="fixed w-full z-50 transition-all duration-300 bg-[#FDFBF7] border-b border-gray-100 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0 flex items-center">
                    <a href="index.html" class="font-serif text-3xl font-bold tracking-widest text-[#D4AF37]">SDcream</a>
                </div>
                <div class="hidden md:flex items-center space-x-6">
                    <a href="#" class="text-[#4A3B32] hover:text-[#D4AF37] transition-colors"><i class="fa-solid fa-magnifying-glass"></i></a>

                    <a href="checkout.html" class="text-[#4A3B32] hover:text-[#D4AF37] transition-colors relative">
                        <i class="fa-solid fa-bag-shopping"></i>
                        <span class="absolute -top-2 -right-2 bg-[#D4AF37] text-white text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center">2</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Checkout Content -->
    <section class="pt-32 pb-24">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h1 class="font-serif text-4xl mb-10 text-center text-[#4A3B32] fade-in">Secure Checkout</h1>
            
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
                <!-- Left Column (Billing & Payment) -->
                <div class="lg:col-span-8 fade-in">
                    <!-- Billing Details -->
                    <div class="bg-white p-8 rounded-2xl shadow-sm mb-8">
                        <h2 class="font-serif text-2xl mb-6 flex items-center"><span class="w-8 h-8 rounded-full bg-[#D4AF37] text-white text-sm flex items-center justify-center mr-3">1</span> Shipping Details</h2>
                        <form class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm text-gray-700 mb-2">First Name</label>
                                    <input type="text" class="w-full bg-[#FDFBF7] border border-gray-200 rounded-md px-4 py-3 focus:outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]" placeholder="Jane">
                                </div>
                                <div>
                                    <label class="block text-sm text-gray-700 mb-2">Last Name</label>
                                    <input type="text" class="w-full bg-[#FDFBF7] border border-gray-200 rounded-md px-4 py-3 focus:outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]" placeholder="Doe">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm text-gray-700 mb-2">Address</label>
                                <input type="text" class="w-full bg-[#FDFBF7] border border-gray-200 rounded-md px-4 py-3 focus:outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]" placeholder="123 Luxury Ave, Apt 4B">
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div>
                                    <label class="block text-sm text-gray-700 mb-2">City</label>
                                    <input type="text" class="w-full bg-[#FDFBF7] border border-gray-200 rounded-md px-4 py-3 focus:outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]" placeholder="Colombo">
                                </div>
                                <div>
                                    <label class="block text-sm text-gray-700 mb-2">State/Province</label>
                                    <input type="text" class="w-full bg-[#FDFBF7] border border-gray-200 rounded-md px-4 py-3 focus:outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]" placeholder="Western">
                                </div>
                                <div>
                                    <label class="block text-sm text-gray-700 mb-2">Zip Code</label>
                                    <input type="text" class="w-full bg-[#FDFBF7] border border-gray-200 rounded-md px-4 py-3 focus:outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]" placeholder="00300">
                                </div>
                            </div>
                        </form>
                    </div>

                    <!-- Payment Details -->
                    <div class="bg-white p-8 rounded-2xl shadow-sm">
                        <h2 class="font-serif text-2xl mb-6 flex items-center"><span class="w-8 h-8 rounded-full bg-[#D4AF37] text-white text-sm flex items-center justify-center mr-3">2</span> Payment Method</h2>
                        <div class="space-y-4">
                            <!-- Credit Card Tab -->
                            <div class="border border-[#D4AF37] bg-[#FDFBF7] rounded-lg p-5">
                                <label class="flex items-center cursor-pointer mb-5">
                                    <input type="radio" name="payment_method" class="w-5 h-5 text-[#D4AF37] focus:ring-[#D4AF37]" checked>
                                    <span class="ml-3 font-medium flex-1">Credit / Debit Card</span>
                                    <div class="flex space-x-2 text-2xl">
                                        <i class="fa-brands fa-cc-visa text-blue-800"></i>
                                        <i class="fa-brands fa-cc-mastercard text-red-600"></i>
                                        <i class="fa-brands fa-cc-amex text-blue-500"></i>
                                    </div>
                                </label>
                                
                                <div class="space-y-4">
                                    <div>
                                        <label class="block text-xs text-gray-500 mb-1">Card Number</label>
                                        <div class="relative">
                                            <input type="text" class="w-full bg-white border border-gray-300 rounded-md pl-10 pr-4 py-3 focus:outline-none focus:border-[#D4AF37]" placeholder="0000 0000 0000 0000">
                                            <i class="fa-regular fa-credit-card absolute left-3 top-3.5 text-gray-400 text-lg"></i>
                                        </div>
                                    </div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs text-gray-500 mb-1">Expiry Date (MM/YY)</label>
                                            <input type="text" class="w-full bg-white border border-gray-300 rounded-md px-4 py-3 focus:outline-none focus:border-[#D4AF37]" placeholder="12/26">
                                        </div>
                                        <div>
                                            <label class="block text-xs text-gray-500 mb-1">CVC</label>
                                            <input type="text" class="w-full bg-white border border-gray-300 rounded-md px-4 py-3 focus:outline-none focus:border-[#D4AF37]" placeholder="123">
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-xs text-gray-500 mb-1">Name on Card</label>
                                        <input type="text" class="w-full bg-white border border-gray-300 rounded-md px-4 py-3 focus:outline-none focus:border-[#D4AF37]" placeholder="Jane Doe">
                                    </div>
                                </div>
                            </div>
                            
                            <!-- PayPal Tab -->
                            <div class="border border-gray-200 rounded-lg p-5 hover:border-gray-300 transition-colors">
                                <label class="flex items-center cursor-pointer">
                                    <input type="radio" name="payment_method" class="w-5 h-5 text-[#D4AF37] focus:ring-[#D4AF37]">
                                    <span class="ml-3 font-medium flex-1">PayPal</span>
                                    <i class="fa-brands fa-paypal text-blue-600 text-2xl"></i>
                                </label>
                            </div>

                            <!-- Cash on Delivery Tab -->
                            <div class="border border-gray-200 rounded-lg p-5 hover:border-gray-300 transition-colors">
                                <label class="flex items-center cursor-pointer">
                                    <input type="radio" name="payment_method" class="w-5 h-5 text-[#D4AF37] focus:ring-[#D4AF37]">
                                    <span class="ml-3 font-medium flex-1">Cash on Delivery</span>
                                    <i class="fa-solid fa-money-bill-wave text-green-600 text-2xl"></i>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column (Order Summary) -->
                <div class="lg:col-span-4 fade-in">
                    <div class="bg-white p-8 rounded-2xl shadow-sm sticky top-28">
                        <h2 class="font-serif text-2xl mb-6">Order Summary</h2>
                        
                        <!-- Cart Items -->
                        <div class="space-y-4 mb-6">
                            <div class="flex items-center space-x-4 border-b border-gray-100 pb-4">
                                <img src="assets/images/hero_cream_jar.png" alt="SDcream" class="w-16 h-16 object-cover rounded-md bg-[#FDFBF7]">
                                <div class="flex-1">
                                    <h4 class="font-medium text-sm">SDcream Signature</h4>
                                    <p class="text-xs text-gray-500">Qty: 1</p>
                                </div>
                                <span class="text-sm font-medium">$85.00</span>
                            </div>
                        </div>

                        <!-- Price Breakdown -->
                        <div class="space-y-3 text-sm text-gray-600 mb-6">
                            <div class="flex justify-between">
                                <span>Subtotal</span>
                                <span class="font-medium text-[#4A3B32]">$85.00</span>
                            </div>
                            <div class="flex justify-between">
                                <span>Shipping</span>
                                <span class="font-medium text-green-600 text-xs tracking-wider uppercase">Free</span>
                            </div>
                            <div class="flex justify-between">
                                <span>Taxes</span>
                                <span class="font-medium text-[#4A3B32]">$0.00</span>
                            </div>
                        </div>

                        <div class="border-t border-gray-200 pt-4 mb-8">
                            <div class="flex justify-between items-center">
                                <span class="font-serif text-lg">Total</span>
                                <span class="font-serif text-2xl text-[#D4AF37]">$85.00</span>
                            </div>
                        </div>

                        <!-- Guarantee -->
                        <div class="flex items-center justify-center space-x-2 text-xs text-gray-500 mb-6 bg-[#FDFBF7] p-3 rounded-md">
                            <i class="fa-solid fa-lock text-[#D4AF37]"></i>
                            <span>Guaranteed safe & secure checkout</span>
                        </div>

                        <!-- Pay Button -->
                        <button onclick="window.location.href='success.html'" class="btn-hover w-full bg-[#4A3B32] text-white px-8 py-4 uppercase tracking-wider text-sm font-bold hover:bg-[#322720] rounded-sm shadow-xl transition-all">
                            Complete Order
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-[#2A211D] text-white py-8 border-t border-white/10">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-white/50 text-xs font-light">&copy; 2026 SDcream. All transactions are securely encrypted.</p>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
